<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>반전매력 착즙기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Black+Han+Sans&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0a0a;--white:#fafafa;--off:#f2f0eb;
  --accent:#e8f03c;--muted:#888;--border:#ddd;
  --radius:10px;--card-radius:16px;
}
body{background:var(--off);color:var(--black);font-family:'Noto Sans KR',sans-serif;min-height:100vh}
.wrap{max-width:480px;margin:0 auto;padding:0 0 80px}

/* ─── STEP ─── */
.step{display:none;padding:24px 20px}
.step.active{display:block}

/* ─── LANDING ─── */
.land-header{text-align:center;padding:40px 0 28px}
.land-brand{font-size:11px;letter-spacing:.12em;color:var(--muted);margin-bottom:10px}
.land-title{font-family:'Black Han Sans',sans-serif;font-size:40px;line-height:1.1;margin-bottom:10px;color:var(--black)}
.land-sub{font-size:13px;color:var(--muted);line-height:1.7}
.jjal-preview{width:100%;border-radius:var(--card-radius);overflow:hidden;margin:24px 0;position:relative;background:var(--black)}
.jjal-preview img{width:100%;display:block;opacity:.92}
.jjal-labels{position:absolute;top:0;left:0;width:100%;display:grid;grid-template-columns:1fr 1fr;padding:12px 16px}
.jjal-labels span{font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--white);text-shadow:0 1px 4px rgba(0,0,0,.7)}
.jjal-labels span:last-child{text-align:right}
.jjal-labels-v{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;padding:12px 16px;pointer-events:none}
.jjal-labels-v span{font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--white);text-shadow:0 1px 4px rgba(0,0,0,.7)}
.input-wrap{margin-bottom:8px}
.input-wrap label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
input[type=text]{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:15px;font-family:'Noto Sans KR',sans-serif;background:var(--white);color:var(--black);outline:none;transition:border .15s}
input[type=text]:focus{border-color:var(--black)}
.err{font-size:12px;color:#d63031;margin-top:5px;display:none}
.btn-primary{width:100%;padding:15px;border:none;border-radius:var(--radius);background:var(--black);color:var(--white);font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:12px;transition:opacity .15s}
.btn-primary:disabled{opacity:.3;cursor:not-allowed}
.btn-ghost{width:100%;padding:13px;border:1.5px solid var(--border);border-radius:var(--radius);background:transparent;color:var(--black);font-size:14px;font-weight:500;font-family:'Noto Sans KR',sans-serif;cursor:pointer;margin-top:8px;transition:background .15s}
.btn-ghost:hover{background:var(--white)}
.divider{height:1px;background:var(--border);margin:24px 0}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;font-size:13px;color:var(--muted);cursor:pointer;padding:8px 0 0;font-family:'Noto Sans KR',sans-serif;margin-bottom:4px}
.back-btn:hover{color:var(--black)}
.back-btn svg{flex-shrink:0}

/* ─── QUIZ ─── */
.q-header{margin-bottom:24px}
.q-progress{display:flex;gap:5px;margin-bottom:18px}
.q-dot{flex:1;height:4px;border-radius:2px;background:var(--border);transition:background .2s}
.q-dot.on{background:var(--black)}
.q-num{font-size:11px;color:var(--muted);margin-bottom:6px}
.q-title{font-size:18px;font-weight:700;line-height:1.4;color:var(--black)}
.q-choices{display:flex;flex-direction:column;gap:8px}
.choice{padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;cursor:pointer;background:var(--white);color:var(--black);transition:all .12s;text-align:left}
.choice:hover{border-color:#aaa}
.choice.sel{background:var(--black);color:var(--white);border-color:var(--black)}
.choice-b.sel{background:#1D9E75;color:#fff;border-color:#1D9E75}

/* dual layout */
.dual-header{margin-bottom:16px}
.dual-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.dual-col-label{font-size:12px;font-weight:700;letter-spacing:.02em;color:var(--muted);text-align:center;padding:8px 6px;border-radius:8px;margin-bottom:10px;background:var(--off)}
.dual-col-label.me-label{background:#0a0a0a;color:#fff}
.dual-col-label.fr-label{background:#0F6E56;color:#fff}
.choice-sm{padding:9px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;background:var(--white);color:var(--black);line-height:1.4;transition:all .12s;margin-bottom:6px}
.choice-sm:hover{border-color:#aaa}
.choice-sm.sel{background:var(--black);color:var(--white);border-color:var(--black)}
.choice-sm.sel-b{background:#1D9E75;color:#fff;border-color:#1D9E75}

/* ─── PICK SHEET ─── */
.pick-overlay{background:rgba(0,0,0,.5);border-radius:var(--card-radius);padding:20px;margin-top:16px}
.pick-sheet-title{font-size:15px;font-weight:700;color:var(--white);margin-bottom:16px}
.pick-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border:1.5px solid rgba(255,255,255,.15);border-radius:var(--radius);cursor:pointer;margin-bottom:8px;background:rgba(255,255,255,.06);color:var(--white);transition:all .12s}
.pick-item:hover{background:rgba(255,255,255,.12)}
.pick-item.sel{border-color:var(--accent);background:rgba(232,240,60,.12)}
.pick-radio{width:14px;height:14px;border-radius:50%;border:1.5px solid rgba(255,255,255,.4);flex-shrink:0}
.pick-item.sel .pick-radio{background:var(--accent);border-color:var(--accent)}
.pick-name{font-size:13px;flex:1}
.pick-see{font-size:11px;color:rgba(255,255,255,.4);text-decoration:none;padding:2px 8px;border:1px solid rgba(255,255,255,.2);border-radius:8px}
.pick-see:hover{color:var(--white)}

/* ─── RESULT ─── */
.result-jjal{position:relative;background:var(--black);border-radius:var(--card-radius);overflow:hidden;margin-bottom:16px}
.result-jjal img{width:100%;display:block;opacity:.85}
.result-jjal-overlay{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr}
.jjal-side{display:flex;flex-direction:column;justify-content:flex-end;padding:14px 12px}
.jjal-side:first-child{border-right:1px solid rgba(255,255,255,.15)}
.jjal-side-tag{font-size:9px;letter-spacing:.08em;color:rgba(255,255,255,.55);margin-bottom:4px;font-weight:700}
.jjal-side-mood{font-family:'Black Han Sans',sans-serif;font-size:16px;color:var(--white);text-shadow:0 1px 6px rgba(0,0,0,.8);line-height:1.2}
.jjal-side-sub{font-size:10px;color:rgba(255,255,255,.55);margin-top:2px}
.result-name-tag{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:var(--accent);color:var(--black);font-size:11px;font-weight:700;padding:4px 14px;border-radius:20px;white-space:nowrap}

.card{background:var(--white);border:1px solid var(--border);border-radius:var(--card-radius);padding:16px 18px;margin-bottom:12px}
.card-eyebrow{font-size:10px;font-weight:700;letter-spacing:.08em;color:var(--muted);margin-bottom:12px}
.rank-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.rank-row:last-child{border-bottom:none}
.rank-num{font-size:12px;font-weight:700;color:var(--muted);min-width:18px}
.rank-name{font-size:13px;font-weight:500;flex:1;color:var(--black)}
.rank-pick{font-size:11px;color:var(--muted);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-decoration:none}
.rank-pick:hover{color:var(--black)}
.rank-empty{font-size:13px;color:var(--muted);padding:8px 0}
.item-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.item-row:last-child{border-bottom:none}
.item-thumb{width:44px;height:44px;border-radius:8px;background:var(--off);flex-shrink:0;border:1px solid var(--border)}
.item-info{flex:1}
.item-name{font-size:13px;font-weight:500;color:var(--black)}
.item-mood{font-size:11px;color:var(--muted);margin-top:1px}
.item-see{font-size:11px;color:var(--muted);text-decoration:none;padding:4px 10px;border:1px solid var(--border);border-radius:8px;white-space:nowrap}
.item-see:hover{background:var(--off)}
.section-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.cta-link{display:block;text-align:center;padding:13px;border:1.5px solid var(--border);border-radius:var(--radius);font-size:13px;color:var(--muted);text-decoration:none;margin-bottom:12px;font-weight:500}
.cta-link:hover{background:var(--white);color:var(--black)}
.share-box{background:#111;border-radius:var(--radius);padding:12px 14px;font-size:12px;font-family:monospace;color:#aaa;word-break:break-all;margin:12px 0}
.popup-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;overflow-y:auto;padding:20px}
.popup-bg.active{display:block}
.popup-box{background:var(--off);border-radius:var(--card-radius);max-width:460px;margin:0 auto;overflow:hidden}
.popup-inner{padding:20px}
.popup-close{width:100%;padding:14px;border:none;background:var(--black);color:var(--white);font-size:15px;font-weight:700;font-family:'Noto Sans KR',sans-serif;cursor:pointer;border-radius:0 0 var(--card-radius) var(--card-radius)}
.score-wrap{background:var(--white);border-radius:var(--card-radius);padding:20px;text-align:center;margin:14px 0}
.score-big{font-family:'Black Han Sans',sans-serif;font-size:52px;color:var(--black);line-height:1}
.score-label{font-size:12px;color:var(--muted);margin-top:6px}
.score-bar-bg{height:6px;background:var(--border);border-radius:3px;margin-top:14px;overflow:hidden}
.score-bar-fill{height:100%;background:var(--black);border-radius:3px;transition:width 1s ease}
.score-comment{font-size:14px;font-weight:700;color:var(--black);margin-top:10px}
</style>
</head>
<body>
<div class="wrap">

<!-- 0: 랜딩 -->
<div class="step active" id="s0">
  <div class="land-header">
    <div class="land-brand">링크닷 × 반전매력</div>
    <div class="land-title">반전매력<br>착즙기</div>
    <div class="land-sub">겉으로 보이는 나 vs 나만 아는 나<br>착즙당하고 친구한테 공유해봐</div>
  </div>
  <div class="jjal-preview">
    <img id="jjal-img" src="" alt="기존쎄 vs 유리멘탈"/>
  </div>
  <div id="friend-link-notice" style="display:none;background:#0F6E56;color:#fff;font-size:13px;padding:10px 14px;border-radius:var(--radius);margin-bottom:12px;font-weight:500"></div>
  <div class="input-wrap">
    <label>닉네임으로 시작 (중복 불가)</label>
    <input type="text" id="my-name" placeholder="내 닉네임" maxlength="12" oninput="checkNick()"/>
    <div class="err" id="name-err">이미 사용 중인 닉네임이야</div>
  </div>
  <button class="btn-primary" id="btn-start" onclick="startFlow()" disabled>착즙 시작</button>
</div>

<!-- 1: 단독 6문항 -->
<div class="step" id="s1">
  <button class="back-btn" onclick="goBack('s1')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> 뒤로</button>
  <div class="q-header">
    <div class="q-progress" id="dots1"></div>
    <div class="q-num" id="s1-num"></div>
    <div class="q-title" id="s1-title"></div>
  </div>
  <div class="q-choices" id="s1-area"></div>
  <button class="btn-primary" id="btn-s1" onclick="nextSolo()" disabled style="margin-top:20px">다음</button>
</div>

<!-- 2: 동시 6문항 (내꺼 + 친구꺼) -->
<div class="step" id="s2">
  <button class="back-btn" onclick="goBack('s2')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> 뒤로</button>
  <div class="q-header">
    <div class="q-progress" id="dots2"></div>
    <div class="q-title" id="s2-title" style="font-size:15px;margin-bottom:10px"></div>
  </div>
  <div class="dual-cols">
    <div>
      <div class="dual-col-label me-label" id="s2-me-label"></div>
      <div id="s2-me-area"></div>
    </div>
    <div>
      <div class="dual-col-label fr-label" id="s2-fr-label"></div>
      <div id="s2-fr-area"></div>
    </div>
  </div>
  <button class="btn-primary" id="btn-s2" onclick="nextDual()" disabled>다음</button>
</div>

<!-- 3: 친구꺼만 6문항 -->
<div class="step" id="s3">
  <button class="back-btn" onclick="goBack('s3')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> 뒤로</button>
  <div class="q-header">
    <div class="q-progress" id="dots3"></div>
    <div class="q-num" id="s3-num"></div>
    <div class="q-title" id="s3-title"></div>
  </div>
  <div class="q-choices" id="s3-area"></div>
  <button class="btn-primary" id="btn-s3" onclick="nextFriendOnly()" disabled style="margin-top:20px">다음</button>
</div>

<!-- 4: 친구 아이템 픽 -->
<div class="step" id="s4">
  <button class="back-btn" onclick="goBack('s4')"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg> 뒤로</button>
  <div style="padding:8px 0 12px">
    <div style="font-size:11px;color:var(--muted);margin-bottom:6px" id="s4-eyebrow"></div>
    <div style="font-size:18px;font-weight:700">아이템 하나 밀어줘</div>
    <div style="font-size:13px;color:var(--muted);margin-top:4px">이 친구한테 어울릴 것 같은 거 하나만</div>
  </div>
  <div class="pick-overlay">
    <div class="pick-sheet-title" id="s4-sheet-title"></div>
    <div id="s4-items"></div>
    <button class="btn-primary" id="btn-s4" onclick="submitPick()" disabled>이거야</button>
  </div>
</div>

<!-- 5: 결과 -->
<div class="step" id="s5">
  <div style="padding:8px 0 16px">
    <div style="font-size:11px;color:var(--muted);letter-spacing:.06em;margin-bottom:4px">착즙 완료</div>
    <div style="font-family:'Black Han Sans',sans-serif;font-size:26px" id="s5-main-title"></div>
  </div>

  <!-- 짤 카드 -->
  <div class="result-jjal">
    <img id="jjal-result-img" src="" alt="결과 짤"/>
    <div class="result-name-tag" id="result-name-tag"></div>
    <div class="result-jjal-overlay">
      <div class="jjal-side">
        <div class="jjal-side-tag">기존쎄</div>
        <div class="jjal-side-mood" id="r-outer-mood"></div>
        <div class="jjal-side-sub" id="r-outer-sub"></div>
      </div>
      <div class="jjal-side">
        <div class="jjal-side-tag">유리멘탈</div>
        <div class="jjal-side-mood" id="r-inner-mood"></div>
        <div class="jjal-side-sub" id="r-inner-sub"></div>
      </div>
    </div>
  </div>

  <!-- 친구 랭킹 -->
  <div class="card">
    <div class="card-eyebrow">친구 랭킹 — 나한테 아이템 밀어준 사람들</div>
    <div id="friend-ranking"><div class="rank-empty">아직 아무도 안 왔어. 링크 공유해봐!</div></div>
  </div>

  <div class="divider" style="margin:8px 0 16px"></div>

  <!-- 내 무드 아이템 추천 -->
  <div class="section-label" id="outer-section-label"></div>
  <div class="card" style="margin-bottom:12px"><div id="outer-items-list"></div></div>

  <div class="section-label" id="inner-section-label"></div>
  <div class="card" style="margin-bottom:16px"><div id="inner-items-list"></div></div>

  <a href="https://linkdot.co"  class="cta-link">앱에서 더 많은 아이템 보기 →</a>
  <button class="btn-primary" id="btn-share" onclick="shareResult()" style="margin-top:4px">친구에게 공유하기</button>
</div>

</div><!-- /wrap -->

<!-- 친구 결과 팝업 -->
<div class="popup-bg" id="friend-popup">
  <div class="popup-box">
    <div class="popup-inner">
      <div style="font-size:11px;color:var(--muted);letter-spacing:.06em;margin-bottom:4px">친구 착즙 결과</div>
      <div style="font-family:'Black Han Sans',sans-serif;font-size:22px;margin-bottom:14px" id="popup-friend-title"></div>
      <div class="result-jjal" id="popup-jjal">
        <img src="" id="popup-jjal-img" alt="결과 짤" style="width:100%;display:block;opacity:.85"/>
        <div class="result-name-tag" id="popup-name-tag"></div>
        <div class="result-jjal-overlay">
          <div class="jjal-side">
            <div class="jjal-side-tag">기존쎄</div>
            <div class="jjal-side-mood" id="popup-outer-mood"></div>
            <div class="jjal-side-sub" id="popup-outer-sub"></div>
          </div>
          <div class="jjal-side">
            <div class="jjal-side-tag">유리멘탈</div>
            <div class="jjal-side-mood" id="popup-inner-mood"></div>
            <div class="jjal-side-sub" id="popup-inner-sub"></div>
          </div>
        </div>
      </div>
      <div class="score-wrap">
        <div class="score-big" id="popup-score">0%</div>
        <div class="score-label">내가 이 친구를 맞춘 정도</div>
        <div class="score-bar-bg"><div class="score-bar-fill" id="popup-score-bar" style="width:0%"></div></div>
        <div class="score-comment" id="popup-score-comment"></div>
      </div>
      <div style="font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px">친구 무드 아이템</div>
      <div class="card" style="margin-bottom:0"><div id="popup-friend-items"></div></div>
    </div>
    <button class="popup-close" onclick="closePopup()">내 결과 보기 →</button>
  </div>

function allItems(o,i){return[...(MOODS[o]?.items||[]),...(MOODS[i]?.items||[])]}

function getDB(){try{return JSON.parse(localStorage.getItem('착즙기_v3')||'{}')}catch{return{}}}
function saveDB(d){try{localStorage.setItem('착즙기_v3',JSON.stringify(d))}catch{}}

let ST={myName:'',friendName:'',friendData:null,myAnswers:[],friendAnswers:[],myOuter:'',myInner:'',friendOuter:'',friendInner:'',qIdx:0,pickedItem:null,mode:'',_pickCb:null};

function show(id){document.querySelectorAll('.step').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}
function makeDots(id,total,cur){const c=document.getElementById(id);c.innerHTML='';for(let i=0;i<total;i++){const d=document.createElement('div');d.className='q-dot'+(i<=cur?' on':'');c.appendChild(d)}}
function calcMood(ans){
  const oc={},ic={};
  ans.forEach(a=>{const o=OM[a],i=IM[a];if(o)oc[o]=(oc[o]||0)+1;if(i)ic[i]=(ic[i]||0)+1});
  return{outer:Object.keys(oc).sort((a,b)=>oc[b]-oc[a])[0]||'쿨시크',inner:Object.keys(ic).sort((a,b)=>ic[b]-ic[a])[0]||'다크'};
}

function checkNick(){
  const v=document.getElementById('my-name').value.trim();
  const db=getDB();
  const err=document.getElementById('name-err');
  if(!v){document.getElementById('btn-start').disabled=true;err.style.display='none';return}
  if(db[v]){err.style.display='block';document.getElementById('btn-start').disabled=true}
  else{err.style.display='none';document.getElementById('btn-start').disabled=false}
}

function startFlow(){
  const name=document.getElementById('my-name').value.trim();
  if(!name)return;
  ST.myName=name;
  const db=getDB();

  // URL 파라미터에서 직접 파싱
  const fenc=new URLSearchParams(window.location.search).get('f');
  let fd=null;
  if(fenc){
    try{fd=JSON.parse(decodeURIComponent(escape(atob(fenc))))}catch(e){}
    if(!fd&&window._fd){fd=window._fd}
  }

  if(fd){
    ST.friendName=fd.n;ST.friendData=fd;
    if(db[name]){
      // 이미 내 테스트 완료 → 친구꺼만
      ST.myOuter=db[name].outer;ST.myInner=db[name].inner;
      ST.myAnswers=db[name].answers||[];
      ST.mode='friend-only';ST.qIdx=0;ST.friendAnswers=[];
      loadQ('s3','dots3','s3-num','s3-title','s3-area','btn-s3',fd.n+'의 착즙 도와주기');
    } else {
      // 새 유저 → 바로 듀얼
      ST.mode='both';ST.qIdx=0;ST.myAnswers=[];ST.friendAnswers=[];
      loadDual();
    }
  } else {
    if(db[name]){ST.myOuter=db[name].outer;ST.myInner=db[name].inner;showResult()}
    else{ST.mode='solo';ST.qIdx=0;ST.myAnswers=[];soloStart()}
  }
}

function soloStart(){loadQ('s1','dots1','s1-num','s1-title','s1-area','btn-s1','')}

function loadQ(stepId,dotsId,numId,titleId,areaId,btnId,subtitle){
  const q=QS[ST.qIdx];
  makeDots(dotsId,6,ST.qIdx);
  document.getElementById(numId).textContent=(subtitle||'')+(subtitle?'  ·  ':'')+`${ST.qIdx+1} / 6`;
  document.getElementById(titleId).textContent=q.t;
  const area=document.getElementById(areaId);
  area.innerHTML='';
  q.o.forEach(opt=>{
    const d=document.createElement('div');d.className='choice';d.textContent=opt;
    d.onclick=()=>{area.querySelectorAll('.choice').forEach(c=>c.classList.remove('sel'));d.classList.add('sel');document.getElementById(btnId).disabled=false};
    area.appendChild(d);
  });
  document.getElementById(btnId).disabled=true;
  show(stepId);
}

function nextSolo(){
  const sel=document.getElementById('s1-area').querySelector('.sel');
  if(!sel)return;
  ST.myAnswers.push(sel.textContent);
  ST.qIdx++;
  if(ST.qIdx<6){loadQ('s1','dots1','s1-num','s1-title','s1-area','btn-s1','')}
  else{
    const m=calcMood(ST.myAnswers);ST.myOuter=m.outer;ST.myInner=m.inner;
    const db=getDB();db[ST.myName]={outer:m.outer,inner:m.inner,answers:ST.myAnswers,friendPicks:[]};saveDB(db);
    if(ST.mode==='both'){ST.qIdx=0;ST.friendAnswers=[];loadDual()}else{showResult()}
  }
}

function loadDual(){
  const q=QS[ST.qIdx];
  makeDots('dots2',6,ST.qIdx);
  document.getElementById('s2-title').textContent=q.t;
  document.getElementById('s2-me-label').textContent='나 ('+ST.myName+')';
  document.getElementById('s2-fr-label').textContent='친구 ('+ST.friendName+')';
  const meA=document.getElementById('s2-me-area'),frA=document.getElementById('s2-fr-area');
  meA.innerHTML='';frA.innerHTML='';
  q.o.forEach(opt=>{
    const dm=document.createElement('div');dm.className='choice-sm';dm.textContent=opt;
    dm.onclick=()=>{meA.querySelectorAll('.choice-sm').forEach(c=>c.classList.remove('sel'));dm.classList.add('sel');chkDual()};
    meA.appendChild(dm);
    const df=document.createElement('div');df.className='choice-sm';df.textContent=opt;
    df.onclick=()=>{frA.querySelectorAll('.choice-sm').forEach(c=>c.classList.remove('sel','sel-b'));df.classList.add('sel','sel-b');chkDual()};
    frA.appendChild(df);
  });
  document.getElementById('btn-s2').disabled=true;
  show('s2');
}
function chkDual(){
  const ms=document.getElementById('s2-me-area').querySelector('.sel');
  const fs=document.getElementById('s2-fr-area').querySelector('.sel');
  document.getElementById('btn-s2').disabled=!(ms&&fs);
}
function nextDual(){
  const ms=document.getElementById('s2-me-area').querySelector('.sel');
  const fs=document.getElementById('s2-fr-area').querySelector('.sel');
  if(!ms||!fs)return;
  ST.myAnswers[ST.qIdx]=ms.textContent;
  ST.friendAnswers.push(fs.textContent);
  ST.qIdx++;
  if(ST.qIdx<6){loadDual()}
  else{
    const mm=calcMood(ST.myAnswers);ST.myOuter=mm.outer;ST.myInner=mm.inner;
    const fm=calcMood(ST.friendAnswers);ST.friendOuter=fm.outer;ST.friendInner=fm.inner;
    const db=getDB();
    db[ST.myName]={outer:mm.outer,inner:mm.inner,answers:ST.myAnswers,friendPicks:[]};
    if(!db[ST.friendName])db[ST.friendName]={outer:fm.outer,inner:fm.inner,answers:ST.friendAnswers,friendPicks:[]};
    saveDB(db);
    showPickSheet(ST.friendName,ST.friendOuter,ST.friendInner,()=>showResult());
  }
}

function nextFriendOnly(){
  const sel=document.getElementById('s3-area').querySelector('.sel');
  if(!sel)return;
  ST.friendAnswers.push(sel.textContent);
  ST.qIdx++;
  if(ST.qIdx<6){loadQ('s3','dots3','s3-num','s3-title','s3-area','btn-s3',ST.friendName+'의 착즙 도와주기')}
  else{
    const fm=calcMood(ST.friendAnswers);ST.friendOuter=fm.outer;ST.friendInner=fm.inner;
    const db=getDB();
    if(!db[ST.friendName])db[ST.friendName]={outer:fm.outer,inner:fm.inner,answers:ST.friendAnswers,friendPicks:[]};
    saveDB(db);
    showPickSheet(ST.friendName,ST.friendOuter,ST.friendInner,()=>showResult());
  }
}

function showPickSheet(friendName,fOuter,fInner,cb){
  document.getElementById('s4-eyebrow').textContent=friendName+'의 무드 — '+fOuter+' / '+fInner;
  document.getElementById('s4-sheet-title').textContent=friendName+'한테 어울리는 아이템 하나만';
  const items=allItems(fOuter,fInner);
  const area=document.getElementById('s4-items');
  area.innerHTML='';
  ST._pickCb=cb;
  items.forEach(it=>{
    const d=document.createElement('div');d.className='pick-item';
    d.innerHTML=`<div class="pick-radio"></div><span class="pick-name">${it.n}</span><a href="${it.u}"  class="pick-see" onclick="event.stopPropagation()">보기</a>`;
    d.onclick=()=>{area.querySelectorAll('.pick-item').forEach(p=>p.classList.remove('sel'));d.classList.add('sel');ST.pickedItem=it;document.getElementById('btn-s4').disabled=false};
    area.appendChild(d);
  });
  document.getElementById('btn-s4').disabled=true;
  show('s4');
}

function submitPick(){
  if(!ST.pickedItem)return;
  const db=getDB();
  if(db[ST.friendName]){
    if(!db[ST.friendName].friendPicks)db[ST.friendName].friendPicks=[];
    db[ST.friendName].friendPicks.push({from:ST.myName,item:ST.pickedItem});
    saveDB(db);
  }
  // 친구 결과 팝업 먼저
  if(ST.friendOuter){
    showFriendPopup(ST.friendName, ST.friendOuter, ST.friendInner, ST.friendAnswers, ST.myAnswers);
  } else {
    if(ST._pickCb)ST._pickCb();
  }
}

function calcScore(myAnswers, friendInner){
  const matched = myAnswers.filter(a => IM[a] === friendInner).length;
  return Math.round((matched / 6) * 100);
}

function showFriendPopup(friendName, fOuter, fInner, friendAnswers, myAnswers){
  const om = MOODS[fOuter]||{sub:'',items:[]};
  const im = MOODS[fInner]||{sub:'',items:[]};
  const jjalSrc = document.getElementById('jjal-img').src;

  document.getElementById('popup-friend-title').textContent = friendName + '의 반전매력';
  document.getElementById('popup-name-tag').textContent = friendName;
  document.getElementById('popup-jjal-img').src = jjalSrc;
  document.getElementById('popup-outer-mood').textContent = fOuter;
  document.getElementById('popup-outer-sub').textContent = om.sub||'';
  document.getElementById('popup-inner-mood').textContent = fInner;
  document.getElementById('popup-inner-sub').textContent = im.sub||'';

  const score = calcScore(myAnswers, fInner);
  document.getElementById('popup-score').textContent = score + '%';
  document.getElementById('popup-score-bar').style.width = '0%';
  setTimeout(()=>{ document.getElementById('popup-score-bar').style.width = score + '%'; }, 100);

  const comments = {
    0: '전혀 몰랐네 ㅋㅋ 남이야?',
    17: '거의 모름. 그냥 아는 사이?',
    33: '반만 알았어. 아직 멀었다',
    50: '절반은 맞췄네. 꽤 아는 편',
    67: '잘 아네. 진짜 친구다',
    83: '거의 다 맞춤. 무서울 정도',
    100: '완벽히 맞췄어. 소름...'
  };
  const key = [0,17,33,50,67,83,100].reverse().find(k => score >= k);
  document.getElementById('popup-score-comment').textContent = comments[key];

  const allIt = [...(om.items||[]), ...(im.items||[])];
  document.getElementById('popup-friend-items').innerHTML = allIt.map(it=>`
    <div class="item-row">
      <div class="item-thumb"></div>
      <div class="item-info"><div class="item-name">${it.n}</div><div class="item-mood">${fOuter}/${fInner}</div></div>
      <a href="${it.u}"  class="item-see">보기</a>
    </div>`).join('');

  document.getElementById('friend-popup').classList.add('active');
}

function closePopup(){
  document.getElementById('friend-popup').classList.remove('active');
  if(ST._pickCb)ST._pickCb();
}

function showResult(){
  const db=getDB();
  const me=db[ST.myName]||{outer:ST.myOuter,inner:ST.myInner,friendPicks:[]};
  const outer=me.outer||'쿨시크';
  const inner=me.inner||'다크';
  const om=MOODS[outer]||{sub:'',items:[]};
  const im=MOODS[inner]||{sub:'',items:[]};

  document.getElementById('s5-main-title').textContent=ST.myName+'의 반전매력';
  document.getElementById('result-name-tag').textContent=ST.myName;
  document.getElementById('r-outer-mood').textContent=outer;
  document.getElementById('r-outer-sub').textContent=om.sub||'';
  document.getElementById('r-inner-mood').textContent=inner;
  document.getElementById('r-inner-sub').textContent=im.sub||'';

  const picks=me.friendPicks||[];
  const rankEl=document.getElementById('friend-ranking');

  const DUMMY_URLS=['https://dash.dotslashdash.com/l/MzY5OQ','https://dash.dotslashdash.com/l/MzM2Nw','https://dash.dotslashdash.com/l/MzgxMQ'];
  const DUMMY=[
    {from:'수진',score:83,url:DUMMY_URLS[0]},
    {from:'민준',score:50,url:DUMMY_URLS[1]},
    {from:'지은',score:17,url:DUMMY_URLS[2]}
  ];
  const rankData=[...DUMMY,...picks.map((p,i)=>({from:p.from,score:null,url:p.item?.u||DUMMY_URLS[i%3]}))];

  rankEl.innerHTML=rankData.map((p,i)=>`
    <div class="rank-row">
      <span class="rank-num">${i+1}</span>
      <span class="rank-name">${p.from}</span>
      ${p.score!==null?`<span style="font-size:11px;color:var(--muted);margin-right:8px">${p.score}%</span>`:''}
      <a href="${p.url}"  style="font-size:20px;text-decoration:none;line-height:1" title="추천 아이템 보기">🎁</a>
    </div>`).join('');

  document.getElementById('outer-section-label').textContent='겉무드 — '+outer;
  document.getElementById('inner-section-label').textContent='속무드 — '+inner;

  document.getElementById('outer-items-list').innerHTML=om.items.map(it=>`
    <div class="item-row">
      <div class="item-thumb"></div>
      <div class="item-info"><div class="item-name">${it.n}</div><div class="item-mood">${outer}</div></div>
      <a href="${it.u}"  class="item-see">보기</a>
    </div>`).join('');
  document.getElementById('inner-items-list').innerHTML=im.items.map(it=>`
    <div class="item-row">
      <div class="item-thumb"></div>
      <div class="item-info"><div class="item-name">${it.n}</div><div class="item-mood">${inner}</div></div>
      <a href="${it.u}"  class="item-see">보기</a>
    </div>`).join('');

  const enc=btoa(unescape(encodeURIComponent(JSON.stringify({n:ST.myName,o:outer,i:inner}))));
  ST._shareEnc=enc;
  show('s5');
}

function shareResult(){
  const base = window.location.href.split('?')[0];
  const url = base + '?f=' + ST._shareEnc;
  if(navigator.share){
    navigator.share({title:'반전매력 착즙기', text:'반전매력착즙기 왓이즈댓 😳\n', url:url});
    return;
  }
  // fallback: 링크 박스 보여주기
  const existing = document.getElementById('share-url-box');
  if(existing){existing.remove();return;}
  const box = document.createElement('div');
  box.id='share-url-box';
  box.style.cssText='background:#111;border-radius:10px;padding:12px 14px;font-size:12px;font-family:monospace;color:#aaa;word-break:break-all;margin-top:10px;position:relative;';
  box.innerHTML=`<div style="font-size:11px;color:#666;margin-bottom:6px">아래 링크 복사해서 친구에게 보내줘</div><div id="share-url-text" style="color:#e8f03c;user-select:all">${url}</div><button onclick="copyShareUrl('${url}',this)" style="margin-top:8px;width:100%;padding:8px;background:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif">복사하기</button>`;
  document.getElementById('btn-share').after(box);
}

function copyShareUrl(url, btn){
  try{
    navigator.clipboard.writeText(url).then(()=>{btn.textContent='복사됐어!';setTimeout(()=>{btn.textContent='복사하기'},2000)});
  } catch(e){
    const el=document.createElement('textarea');
    el.value=url;document.body.appendChild(el);el.select();document.execCommand('copy');document.body.removeChild(el);
    btn.textContent='복사됐어!';setTimeout(()=>{btn.textContent='복사하기'},2000);
  }
}

function goBack(currentStep){
  if(currentStep==='s1'){
    if(ST.qIdx>0){ST.qIdx--;ST.myAnswers.pop();loadQ('s1','dots1','s1-num','s1-title','s1-area','btn-s1','')}
    else{show('s0')}
  } else if(currentStep==='s2'){
    if(ST.qIdx>0){ST.qIdx--;ST.friendAnswers.pop();loadDual()}
    else{ST.qIdx=0;ST.myAnswers=[];loadQ('s1','dots1','s1-num','s1-title','s1-area','btn-s1','')}
  } else if(currentStep==='s3'){
    if(ST.qIdx>0){ST.qIdx--;ST.friendAnswers.pop();loadQ('s3','dots3','s3-num','s3-title','s3-area','btn-s3',ST.friendName+'의 착즙 도와주기')}
    else{show('s0')}
  } else if(currentStep==='s4'){
    ST.pickedItem=null;
    if(ST.mode==='both'){ST.qIdx=5;loadDual()}
    else if(ST.mode==='friend-only'){ST.qIdx=5;loadQ('s3','dots3','s3-num','s3-title','s3-area','btn-s3',ST.friendName+'의 착즙 도와주기')}
  }
}

const p=new URLSearchParams(window.location.search);
const fenc=p.get('f');
window._fd=null;
if(fenc){
  try{
    const fd=JSON.parse(decodeURIComponent(escape(atob(fenc))));
    window._fd=fd;
    document.addEventListener('DOMContentLoaded',()=>{
      const inp=document.getElementById('my-name');
      const notice=document.getElementById('friend-link-notice');
      if(inp) inp.placeholder=fd.n+'이(가) 착즙 요청함';
      if(notice){notice.textContent=fd.n+'의 링크로 접속했어. 닉네임 입력하면 같이 착즙 시작!';notice.style.display='block';}
    });
  }catch(e){console.error('랜딩 파싱 실패:',e);}
}
</script>
